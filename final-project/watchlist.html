<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieBox | Watchlist</title>
    <meta name="description" content="MovieBox is your go-to platform for movie recommendations, reviews, and trending films. Discover new movies and save your favourites all in one place.">
    <meta name="author" content="Mark John">

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.png">

    <!-- Open Graph Meta Tags for Social Sharing -->
    <meta property="og:title" content="MovieBox | Discover Trending Films">
    <meta property="og:description" content="Explore the latest trending movies and manage your personal watchlist.">
    <meta property="og:image" content="https://macsunjohn.github.io/wdd231/final-project/images/logo.png">
    <meta property="og:url" content="https://macsunjohn.github.io/wdd231/final-project/index.html">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Play:wght@400;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/movie-small.css">
    <link rel="stylesheet" href="styles/movie-larger.css">

    <!-- JavaScript -->
    <script src="scripts/date.js" defer></script>
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/watchlist.js" type="module"></script>
    
</head>

<body>
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="images/logo.png" alt="MovieBox Logo" id="logo-img" loading="lazy">
                <span>Movie</span>Box
            </a>
        </div>
        
        <div class="search-container">
            <input type="text" id="header-search" placeholder="Search movies...">
        </div>

        <button type="button" id="menu-button" aria-label="Toggle Menu">&#9776;</button>
        
        <nav id="main-nav">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="browse.html">Browse</a>
            <a href="watchlist.html" class="active">Watchlist</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

<!--MAIN-->

<main class="layout">

  <!-- SIDEBAR FILTERS -->
  <aside class="sidebar">
    <h3>Filters</h3>

    <label for="genre-select">Genre</label>
    <select id="genre-select">
      <option>All</option>
      <option>Action</option>
      <option>Drama</option>
      <option>Comedy</option>
      <option>Action Comedy</option>
      <option>Action Drama</option>
    </select>

    <label for="year-select">Year</label>
    <select id="year-select">
      <option>All</option>
      <option>2025</option>
      <option>2024</option>
      <option>2023</option>
    </select>

    <label for="rating-select">Rating</label>
    <select id="rating-select">
      <option>All</option>
      <option>9+</option>
      <option>8+</option>
      <option>7+</option>
    </select>
  </aside>
  <!-- MAIN CONTENT -->
  <section class="content">

    <h1 class="page-title">Watchlist</h1>

    <div id="watchlist-grid" class="grid">
      <!-- JS inject movie cards here -->
    </div>

    <p id="empty-watchlist" class="empty">
      Your watchlist is empty. Go add some movies 🎬
    </p>

    <!-- PAGINATION -->
    <div class="pagination">
      <button type="button">‹</button>
      <button type="button" class="active">1</button>
      <button type="button">2</button>
      <button type="button">3</button>
      <button type="button">›</button>
    </div>

  </section>

</main>
<!--FOOTER-->
<footer>
        <div class="footer-content">
            <p>&copy; <span id="current-year"></span> MovieBox | Mark John</p>
            <p id="last-modified"></p>
            <p><a href="https://www.loom.com/share/9b57f1fb6f3e4ce5b10a4fe13e2167ee" class="video">Video Demonstration</a></p>
        </div>
    </footer>

</body>
</html>
