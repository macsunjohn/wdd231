<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieBox | Browse Movies</title>
    <meta name="description" content="MovieBox is your go-to platform for movie recommendations, reviews, and trending films. Discover new movies and save your favourites all in one place.">
    <meta name="author" content="Mark John">

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.png">

    <!-- Open Graph Meta Tags for Social Sharing -->
    <meta property="og:title" content="MovieBox | Discover Trending Films">
    <meta property="og:description" content="Explore the latest trending movies and manage your personal watchlist.">
    <meta property="og:image" content="https://macsunjohn.github.io/wdd231/final-project/images/logo.png">
    <meta property="og:url" content="https://macsunjohn.github.io/wdd231/final-project/index.html">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Play:wght@400;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/movie-small.css">
    <link rel="stylesheet" href="styles/movie-larger.css">

    <!-- JavaScript -->
    <script src="scripts/date.js" defer></script>
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/movies.js" defer></script>
    <script src="scripts/browse.js" defer></script>

    
</head>
<body>

<!-- Header -->
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="images/logo.png" alt="MovieBox Logo" id="logo-img" loading="lazy">
                <span>Movie</span>Box
            </a>
        </div>
        
        <div class="search-container">
            <input type="text" id="header-search" placeholder="Search movies...">
        </div>

        <button type="button" id="menu-button" aria-label="Toggle Menu">&#9776;</button>
        
        <nav id="main-nav">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="browse.html" class="active">Browse</a>
            <a href="contact.html">Contact Us</a>
            <a href="watchlist.html">Watchlist</a>
        </nav>
    </header>

<!-- Main Content -->
   <main class="layout">
        <aside class="sidebar">
            <div class="filter-group">
                <h3 class="filter-title">Filters</h3>
                
                <label for="filter-genre">Genre</label>
                <select id="filter-genre">
                    <option value="all">All Genres</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Horror">Horror</option>
                    <option value="Action">Drama</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Action">Adventure</option>
                    <option value="Romance">Romance</option>
                    <option value="Action">Documentary</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filter-year">Year</label>
                <select id="filter-year">
                    <option value="all">All Years</option>
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filter-rating">Rating</label>
                <select id="filter-rating">
                    <option value="all">All Ratings</option>
                    <option value="9">9.0+</option>
                    <option value="8">8.0+</option>
                    <option value="7">7.0+</option>
                    <option value="6">6.0+</option>
                </select>
            </div>
        </aside>

        <section class="content">
            <h1 class="page-title">Browse Movies</h1>
            
           <div id="movie-grid" class="movie-grid"></div>

            <!-- PAGINATION -->
    <div class="pagination">
      <button type="button">‹</button>
      <button type="button" class="active">1</button>
      <button type="button">2</button>
      <button type="button">3</button>
      <button type="button">›</button>
    </div>

        </section>
    </main>

    <!--Footer -->
    <footer>
        <div class="footer-content">
            <p>&copy; <span id="current-year"></span> MovieBox | Mark John</p>
            <p id="last-modified"></p>
        </div>
    </footer>

</body>
</html>
