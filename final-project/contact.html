<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieBox | Contact Us</title>
    <meta name="description" content="MovieBox is your go-to platform for movie recommendations, reviews, and trending films. Discover new movies and save your favourites all in one place.">
    <meta name="author" content="Mark John">

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.png">

    <!-- Open Graph Meta Tags for Social Sharing -->
    <meta property="og:title" content="MovieBox | Discover Trending Films">
    <meta property="og:description" content="Explore the latest trending movies and manage your personal watchlist.">
    <meta property="og:image" content="https://macsunjohn.github.io/wdd231/final-project/images/logo.png">
    <meta property="og:url" content="https://macsunjohn.github.io/wdd231/final-project/index.html">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Play:wght@400;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/movie-small.css">
    <link rel="stylesheet" href="styles/movie-larger.css">

    <!-- JavaScript -->
    <script src="scripts/date.js" defer></script>
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/main.js" type="module"></script>
    <script src="scripts/movies.js" type="module"></script>
   

    
</head>

<body>
    <!-- Header -->
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="images/logo.png" alt="MovieBox Logo" id="logo-img" loading="lazy">
                <span>Movie</span>Box
            </a>
        </div>
        
        <div class="search-container">
            <input type="text" id="header-search" placeholder="Search movies...">
        </div>

        <button type="button" id="menu-button" aria-label="Toggle Menu">&#9776;</button>
        
        <nav id="main-nav">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="browse.html">Browse</a>
            <a href="watchlist.html">Watchlist</a>
            <a href="contact.html" class="active">Contact Us</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="contact-main">
        <section class="form-container">
            <h1>Contact Support</h1>
            <p>Have a question about a movie or a bug to report? Let us know.</p>

            <form action="thankyou.html" method="get" class="movie-form">
                <label>
                    First Name*
                    <input type="text" name="fname" id="fname" required 
                           title="Please enter your first name" autocomplete="given-name">
                </label>

                <label>
                    Last Name*
                    <input type="text" name="lname" id="lname" required 
                           title="Please enter your last name" autocomplete="family-name">
                </label>

                <label>
                    Email Address*
                    <input type="email" name="email" id="email" required 
                           placeholder="e.g. mark@example.com"
                           title="Please enter a valid email address" autocomplete="email">
                </label>

                <label>
                    Mobile Phone*
                    <input type="tel" name="phone" id="phone" required 
                           title="Please enter your mobile phone number" autocomplete="tel">
                </label>

                <label>
                    Your Message
                    <textarea name="message" id="message" rows="5" 
                              title="Enter your message here"></textarea>
                </label>

                <input type="hidden" name="timestamp" id="timestamp">

                <input type="submit" value="Send Message" class="submit-btn">
            </form>
        </section>
    </main>

   <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>&copy; <span id="current-year"></span> MovieBox | Mark John</p>
            <p id="last-modified"></p>
        </div>
    </footer>

</body>
</html>
